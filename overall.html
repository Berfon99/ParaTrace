<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
function parsePoints(val) {
  if (val === null || val === undefined || val === '' || val === '—') return null;
  if (typeof val === 'number') return isNaN(val) ? null : val;
  const n = parseFloat(String(val).replace(/[^0-9.]/g, ''));
  return isNaN(n) ? null : n;
}
function rankClass(i) {
  return i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
}

// ── Load cups into dropdown ───────────────────────────────────────────────────
async function loadCups() {
  const sel = document.getElementById('cupSelect');
  try {
    const snap = await window.db.collection('cups').orderBy('name').get();
    snap.docs.forEach(doc => {
      const opt = document.createElement('option');
      opt.value = doc.id;
      opt.textContent = doc.data().name;
      sel.appendChild(opt);
    });
    // Auto-select if only one cup
    if (snap.docs.length === 1) {
      sel.value = snap.docs[0].id;
      sel.dispatchEvent(new Event('change'));
    }
  } catch(e) { console.error('loadCups:', e); }
}

// ── Compute overall standings for a cup ───────────────────────────────────────
async function loadOverall(cupId) {
  const container = document.getElementById('overallContainer');
  container.innerHTML = '<div class="empty-state"><span class="empty-icon">⏳</span>Loading...</div>';

  try {
    // 1. Load all scores for this cup
    const scoresSnap = await window.db.collection('scores').get();
    const allScores = scoresSnap.docs.map(d => ({...d.data(), _id: d.id}));
    const cupScores = allScores.filter(s => s.cupId === cupId);

    if (!cupScores.length) {
      container.innerHTML = '<div class="empty-state"><span class="empty-icon">🪂</span>No scores submitted for this Cup yet.</div>';
      return;
    }

    // 2. Load tasks for this cup
    const tasksSnap = await window.db.collection('tasks')
      .where('cupId', '==', cupId).get();
    const tasks = tasksSnap.docs.map(d => ({id: d.id, ...d.data()}));

    // 3. Group scores by task (compKey)
    // Build task list from scores if tasks collection is empty
    const taskMap = {}; // compKey → { taskId, compName, date, scores[] }
    cupScores.forEach(s => {
      const key = s.compKey || s.taskId || 'unknown';
      if (!taskMap[key]) {
        // Find matching task doc
        const taskDoc = tasks.find(t =>
          t.id === s.taskId ||
          (s.compKey && s.compKey.split('||')[1] === t.wpFingerprint)
        );
        taskMap[key] = {
          taskId: s.taskId || key,
          compName: taskDoc?.compName || s.compName || 'Task',
          date: s.date || taskDoc?.date || '?',
          scores: []
        };
      }
      taskMap[key].scores.push(s);
    });

    // Sort tasks by date
    const sortedTasks = Object.values(taskMap).sort((a, b) =>
      (a.date || '').localeCompare(b.date || '')
    );

    // 4. For each task, compute scored points per pilot
    // (same logic as score.html: best XC among top trackPts = 500, capped)
    const taskResults = sortedTasks.map(task => {
      const pilots = task.scores;
      const maxTrack = Math.max(0, ...pilots.map(p => parsePoints(p.trackPts) || 0));
      const topPilots = pilots.filter(p => (parsePoints(p.trackPts) || 0) === maxTrack);
      const refXc = Math.max(0, ...topPilots.map(p => parsePoints(p.xcPts) || 0));

      function effXc(p) {
        const xc = parsePoints(p.xcPts) || 0;
        const tr = parsePoints(p.trackPts) || 0;
        return tr < maxTrack ? Math.min(xc, refXc) : xc;
      }

      const pilotScores = {};
      pilots.forEach(p => {
        const track = parsePoints(p.trackPts) || 0;
        const compXc = refXc > 0 ? Math.round((effXc(p) / refXc) * 500) : 0;
        pilotScores[p.name] = track + compXc;
      });

      return {
        compName: task.compName,
        date: task.date,
        pilotScores
      };
    });

    // 5. Collect all pilots
    const allPilots = [...new Set(cupScores.map(s => s.name))].sort();

    // 6. Compute totals per pilot
    const pilotTotals = allPilots.map(name => {
      const taskPts = taskResults.map(t => t.pilotScores[name] ?? null);
      const total = taskPts.reduce((sum, pts) => sum + (pts || 0), 0);
      return { name, taskPts, total };
    });

    // Sort by total desc
    pilotTotals.sort((a, b) => b.total - a.total);

    // 7. Render table
    let html = '<table class="overall-table"><thead><tr>';
    html += '<th>#</th><th>Pilot</th>';
    taskResults.forEach((t, i) => {
      html += `<th class="center">
        <div class="task-header-name">${t.compName}</div>
        <div class="task-header">📅 ${t.date}</div>
      </th>`;
    });
    html += '<th class="right">Total</th></tr></thead><tbody>';

    pilotTotals.forEach((pilot, i) => {
      html += `<tr>
        <td class="rank ${rankClass(i)}">${i + 1}</td>
        <td><div class="pilot-name">${pilot.name}</div></td>`;
      pilot.taskPts.forEach(pts => {
        html += `<td class="center">${pts !== null
          ? `<span class="pts-task">${pts}</span>`
          : `<span class="pts-na">—</span>`}</td>`;
      });
      html += `<td class="right"><span class="pts-total">${pilot.total}</span></td></tr>`;
    });

    html += '</tbody></table>';
    container.innerHTML = html;

  } catch(e) {
    console.error('loadOverall:', e);
    container.innerHTML = `<div class="empty-state"><span class="empty-icon">❌</span>Error: ${e.message}</div>`;
  }
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('cupSelect').addEventListener('change', function() {
  if (this.value) loadOverall(this.value);
  else document.getElementById('overallContainer').innerHTML =
    '<div class="empty-state"><span class="empty-icon">🏆</span>Select a Cup above to see overall standings.</div>';
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadCups();
</script>
