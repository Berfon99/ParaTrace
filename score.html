  .score-table th.right{text-align:right;}
  .score-table tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s;}
  .score-table tbody tr:hover{background:rgba(255,255,255,0.03);}
  .score-table td{padding:0.75rem 1rem;font-size:0.72rem;vertical-align:middle;}
  .rank{font-family:'Syne',sans-serif;font-weight:800;font-size:0.9rem;color:rgba(200,223,240,0.25);width:40px;}

  .pts-cell{text-align:right;}

  .pts-total{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;color:var(--gold);}

<body>

<header>
  <div>
    <a href="https://www.fly-air3.com/" target="_blank" style="text-decoration:none">

<main>
  <div class="page-title">🏅 AIR³ TDD Cup · Scores</div>
  <div class="page-sub">AIR³ TDD · Results by competition</div>

  <div style="display:flex;gap:0.6rem;align-items:center;margin-bottom:1.5rem">
    <select id="cupFilter" style="
      background:rgba(255,255,255,0.05);border:1px solid rgba(0,212,255,0.25);
      border-radius:6px;padding:0.5rem 0.8rem;color:var(--cloud);
      font-family:'Space Mono',monospace;font-size:0.65rem;outline:none;cursor:pointer;
      min-width:250px;
    ">
      <option value="">— All AIR³ TDD Cups —</option>
    </select>
    <span id="champStatus" style="font-size:0.6rem;color:rgba(200,223,240,0.3)"></span>
  </div>

  <div id="scoresContainer">
    <div class="empty-state"><span class="empty-icon">⏳</span>Loading scores...</div>
  </div>
</main>

<footer>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
function parsePoints(val) {
  if (val === null || val === undefined || val === '' || val === '—') return null;
  if (typeof val === 'number') return isNaN(val) ? null : val;
  const n = parseFloat(String(val).replace(/[^0-9.]/g, ''));
  return isNaN(n) ? null : n;
}

function rankClass(i) {
  return i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
}

// ── Load cups into filter dropdown ───────────────────────────────────
async function loadCups() {
  const sel = document.getElementById('cupFilter');
  try {
    const snap = await window.db.collection('cups').orderBy('name').get();
    snap.docs.forEach(doc => {
      const opt = document.createElement('option');
      opt.value = doc.id;
      opt.textContent = doc.data().name;
      sel.appendChild(opt);
    });
  } catch(e) { console.error('loadCups:', e); }
}

// ── Load from Firestore (optionally filtered by cup) ─────────────────
async function loadScores(champId) {
  let query = window.db.collection('scores');
  const snapshot = await query.get();
  const all = snapshot.docs.map(doc => {
    const d = doc.data();
    d._firestoreId = doc.id;
    return d;
  });
  // Filter client-side (avoids composite index requirement)
  if (champId) return all.filter(e => e.cupId === champId);
  return all;
}

// ── Group by compKey (canonical) or compName+date (fallback) ─────────────────
function groupEntries(entries) {
  const groups = {};
  entries.forEach(e => {
    const key = e.compKey || ((e.compName || 'Unknown Competition') + '||' + (e.date || '?'));
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });
  return groups;
}

// ── Render ────────────────────────────────────────────────────────────────────
async function renderScores(champId) {
  const container = document.getElementById('scoresContainer');
  container.innerHTML = '<div class="empty-state"><span class="empty-icon">⏳</span>Loading scores...</div>';

  let entries;
  try {
    entries = await loadScores(champId);
    console.log('Loaded', entries.length, 'entries:', entries);
  } catch(err) {
    container.innerHTML = `<div class="empty-state"><span class="empty-icon">❌</span>Error loading scores:<br><b>${err.message}</b></div>`;
    return;
  }

  if (!entries.length) {
    container.innerHTML = `<div class="empty-state"><span class="empty-icon">🪂</span>No scores submitted yet.<br>Go back to the analyzer, load a task + IGC track,<br>run the analysis and click <b>Submit</b>.</div>`;
    return;
  }

  // Sort by date desc
  const parseDate = d => {
    if (!d) return new Date(0);
    const p = d.split('/');
    return p.length === 3 ? new Date(`${p[2]}-${p[1]}-${p[0]}`) : new Date(0);
  };
  entries.sort((a, b) => parseDate(b.date) - parseDate(a.date));

  const groups = groupEntries(entries);
  let html = '';

  for (const [groupKey, pilots] of Object.entries(groups)) {
    // Use most recently submitted entry for display info
    const byRecent = pilots.slice().sort((a,b) => new Date(b.submittedAt||0) - new Date(a.submittedAt||0));
    const displayDate = byRecent[0].date || 'Unknown date';
    const displayName = byRecent[0].compName || 'Unknown Competition';

    // Firestore IDs for this group
    const ids = pilots.map(p => p._firestoreId).filter(Boolean).join('|');

    // ── Scoring ──────────────────────────────────────────────────────────────
    // Max trackPts in group
    const maxTrack = Math.max(0, ...pilots.map(p => parsePoints(p.trackPts) || 0));
    // Best XContest among pilots with maxTrack → reference for 500 pts
    const topPilots = pilots.filter(p => (parsePoints(p.trackPts) || 0) === maxTrack);
    const refXc = Math.max(0, ...topPilots.map(p => parsePoints(p.xcPts) || 0));

    // Effective XC: capped to refXc if pilot has fewer track pts than leader
    function effXc(p) {
      const xc = parsePoints(p.xcPts) || 0;
      const tr = parsePoints(p.trackPts) || 0;
      return tr < maxTrack ? Math.min(xc, refXc) : xc;
    }

    // Sort pilots by total desc
    pilots.sort((a, b) => {
      const ca = refXc > 0 ? Math.round((effXc(a) / refXc) * 500) : 0;
      const cb = refXc > 0 ? Math.round((effXc(b) / refXc) * 500) : 0;
      return ((parsePoints(b.trackPts)||0) + cb) - ((parsePoints(a.trackPts)||0) + ca);
    });

    html += `<div class="date-group">
      <div class="date-header">
        <span>📅 ${displayDate} &nbsp;·&nbsp; 🏁
          <span class="comp-name-edit" data-ids="${ids}" data-task-id="${byRecent[0].taskId||''}" title="Click to rename">${displayName}</span>
        </span>
        <button class="tool-btn clear-btn" data-ids="${ids}">🗑 Clear</button>
      </div>
      <table class="score-table">
        <thead><tr>
          <th>#</th><th>Pilot</th>
          <th class="right">XContest Pts</th>
          <th class="right">Computed XC<br><span style="font-size:0.5rem;opacity:0.5">max 500</span></th>
          <th class="right">Track Pts</th>
          <th class="right">Total</th>
          <th>XContest Link</th>
        </tr></thead>
        <tbody>`;

    pilots.forEach((p, i) => {
      const track   = parsePoints(p.trackPts);
      const xc      = parsePoints(p.xcPts);
      const eff     = effXc(p);
      const capped  = xc !== null && eff < xc;
      const subAt   = p.submittedAt ? new Date(p.submittedAt).toLocaleString() : '';

      const xcCell = xc !== null
        ? `<span class="pts-xc">${xc.toFixed(2)}</span>${capped ? `<br><span style="font-size:0.5rem;color:rgba(200,223,240,0.3)">→ capped ${eff.toFixed(2)}</span>` : ''}`
        : `<span class="pts-na">—</span>`;

      const compXc  = (refXc > 0 && xc !== null) ? Math.round((eff / refXc) * 500) : null;
      const compCell = compXc !== null
        ? `<span class="pts-computed">${compXc}</span>${capped ? ' <span title="Capped: fewer waypoints than leader" style="font-size:0.5rem;color:rgba(255,180,0,0.5)">⚑</span>' : ''}`
        : `<span class="pts-na">—</span>`;

      const trackCell = track !== null ? `<span class="pts-track">${track}</span>` : `<span class="pts-na">—</span>`;

      let total = null;
      if (compXc !== null && track !== null) total = compXc + track;
      else if (compXc !== null) total = compXc;
      else if (track !== null) total = track;
      const totalCell = total !== null ? `<span class="pts-total">${total}</span>` : `<span class="pts-na">—</span>`;

      const linkCell = p.xcUrl ? `<a href="${p.xcUrl}" target="_blank">View flight ↗</a>` : `<span class="pts-na">—</span>`;

      html += `<tr>
        <td class="rank ${rankClass(i)}">${i+1}</td>
        <td><div class="pilot-name">${p.name}</div><div class="submitted-at">${subAt}</div></td>
        <td class="pts-cell">${xcCell}</td>
        <td class="pts-cell">${compCell}</td>
        <td class="pts-cell">${trackCell}</td>
        <td class="pts-cell">${totalCell}</td>
        <td class="xc-link-cell">${linkCell}</td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  }

  container.innerHTML = html;
}

// ── Event delegation: rename + clear ─────────────────────────────────────────
document.getElementById('scoresContainer').addEventListener('click', async e => {

  // Rename
  const nameEl = e.target.closest('.comp-name-edit');
  if (nameEl) {
    const current = nameEl.textContent.trim();
    const newName = prompt('Rename this competition:', current);
    if (!newName || newName.trim() === current) return;
    const ids = nameEl.dataset.ids.split('|').filter(Boolean);
    const taskId = nameEl.dataset.taskId || null;
    try {
      const batch = window.db.batch();
      // Update all scores in this group
      ids.forEach(id => batch.update(window.db.collection('scores').doc(id), { compName: newName.trim() }));
      await batch.commit();
      // Also update the task document so future submits use the new name
      if (taskId) {
        await window.db.collection('tasks').doc(taskId).update({ compName: newName.trim() });
      } else {
        // No taskId stored — find task by compKey from first score
        try {
          const snap = await window.db.collection('scores').doc(ids[0]).get();
          const compKey = snap.data()?.compKey;
          if (compKey) {
            const taskSnap = await window.db.collection('tasks').get();
            const taskDoc = taskSnap.docs.find(d => d.data().wpFingerprint &&
              (compKey.split('||')[1] === d.data().wpFingerprint));
            if (taskDoc) await taskDoc.ref.update({ compName: newName.trim() });
          }
        } catch(e) { /* non-critical */ }
      }
      nameEl.textContent = newName.trim();
    } catch(err) { alert('Error renaming: ' + err.message); }
    return;
  }

  // Clear
  const clearEl = e.target.closest('.clear-btn');
  if (clearEl) {
    const ids = clearEl.dataset.ids.split('|').filter(Boolean);
    if (!ids.length) return;
    if (!confirm(`Delete ${ids.length} score(s) for this competition? This cannot be undone.`)) return;
    clearEl.textContent = '⏳';
    clearEl.disabled = true;
    try {
      const batch = window.db.batch();
      ids.forEach(id => batch.delete(window.db.collection('scores').doc(id)));
      await batch.commit();
      renderScores();
    } catch(err) {
      alert('Error: ' + err.message);
      clearEl.textContent = '🗑 Clear';
      clearEl.disabled = false;
    }
  }
});

// ── Cup filter ──────────────────────────────────────────────────────
document.getElementById('cupFilter').addEventListener('change', function() {
  renderScores(this.value || null);
});

// ── Start ─────────────────────────────────────────────────────────────────────
loadCups();
renderScores(null);
</script>
</body>
